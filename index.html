<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt DB Automated</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./app.css?v=20260223b" />
  <script>
    window.APP_CONFIG = window.APP_CONFIG || { API_BASE: 'api/' };
  </script>
  <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="PromptDB" />
  <link rel="manifest" href="/assets/favicon/site.webmanifest" />
</head>

<body>
  <!-- Login overlay -->
  <div id="loginOverlay" class="login-overlay cosmic-bg">
    <div class="login-card glass">
      <div class="text-center mb-4">
        <span class="logo-planet d-inline-block mb-3" aria-hidden="true"></span>
        <h2 class="text-gradient mb-1">Prompt DB</h2>
        <p class="text-muted small">Sign in to access your templates</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label for="loginUser" class="form-label fw-bold">Username</label>
          <input type="text" class="form-control cosmic-input" id="loginUser" required autocomplete="username"
            placeholder="Enter username">
        </div>
        <div class="mb-3">
          <label for="loginPass" class="form-label fw-bold">Password</label>
          <input type="password" class="form-control cosmic-input" id="loginPass" required
            autocomplete="current-password" placeholder="Enter password">
        </div>
        <div id="loginError" class="alert alert-danger d-none mb-3"></div>
        <button type="submit" class="btn btn-primary w-100 cosmic-btn" id="loginBtn" data-ripple>
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
      </form>
    </div>
  </div>

  <div id="appLayout" class="app-layout cosmic-bg" style="display:none;">
    <aside class="app-sidebar border-end glass">

      <a class="navbar-brand d-flex flex-column align-items-center p-3 text-decoration-none" href="#/generate">
        <img
          src="https://prompt-db.dainedvorak.com/assets/images/prompt-database-and-api-utility__web-app-by-daine-dvorak.png"
          alt="Prompt DB Astronaut Logo" style="height: 150px;">
        <strong class="mt-2 text-gradient">Prompt&nbsp;DB</strong>
      </a>
      <nav class="nav flex-column p-2">
        <a class="nav-link" href="#/generate"><i class="bi bi-magic me-2"></i><span>Generate</span></a>
        <a class="nav-link" href="#/templates"><i class="bi bi-list-ul me-2"></i><span>Templates</span></a>
        <a class="nav-link" href="#/profiles"><i class="bi bi-person-lines-fill me-2"></i><span>Data Profiles</span></a>
        <a class="nav-link" href="#/schema"><i class="bi bi-braces me-2"></i><span>Schema Generator</span></a>
        <a class="nav-link" href="#/history"><i class="bi bi-clock-history me-2"></i><span>History</span></a>
        <a class="nav-link" href="#/settings"><i class="bi bi-gear me-2"></i><span>Settings</span></a>
        <a class="nav-link" href="#/users" id="navUsers" style="display:none;"><i
            class="bi bi-people me-2"></i><span>Users</span></a>

      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-user-profile px-3 pt-2 pb-3">
          <div class="d-flex align-items-center gap-2">
            <div class="user-avatar" id="userAvatar">
              <i class="bi bi-person-fill"></i>
            </div>
            <div class="flex-grow-1 overflow-hidden">
              <div id="loggedInUser" class="fw-semibold text-truncate" style="font-size:.9rem;"></div>
              <div id="loggedInRole" class="text-muted" style="font-size:.7rem;text-transform:capitalize;"></div>
            </div>
            <button class="btn btn-sm btn-outline-secondary" id="logoutBtn" title="Sign out">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
          <div class="mt-2 text-muted" style="font-size:.7rem;">Cosmic v2.0</div>
        </div>
      </div>
    </aside>

    <main class="app-main">
      <header
        class="app-topbar border-bottom d-flex align-items-center gap-2 p-2 px-3 glass position-relative overflow-hidden">
        <div class="falling-stars" aria-hidden="true"></div>
        <div class="flex-grow-1 position-relative">
          <input id="globalSearch" class="form-control form-control-lg cosmic-input"
            placeholder="Search the cosmos (templates & history)…" aria-label="Search" />
          <i class="bi bi-stars search-icon" aria-hidden="true"></i>
        </div>
        <button id="refreshBtn" class="btn btn-outline-light cosmic-btn" title="Refresh data" data-ripple>
          <i class="bi bi-arrow-clockwise"></i>
          <span class="d-none d-sm-inline">Refresh</span>
        </button>
      </header>

      <section id="view-root" class="p-3 p-md-4"></section>
    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <!-- Confirm Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmTitle">Confirm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="confirmBody">Are you sure?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-ripple>Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmOkBtn" data-ripple>OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Template Modal -->
  <div class="modal fade" id="editTplModal" tabindex="-1" aria-hidden="true" aria-labelledby="editTplTitle">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content glass">
        <div class="modal-header">
          <h5 class="modal-title" id="editTplTitle"><i class="bi bi-pencil-square me-2"></i>Edit Template</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editTplForm" class="space-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Template Name</label>
                <input type="text" class="form-control cosmic-input" id="editTplName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Category</label>
                <select class="form-select cosmic-input" id="editTplCategory">
                  <option value="">— No category —</option>
                  <option value="Content">Content</option>
                  <option value="Schema">Schema</option>
                  <option value="QA">QA</option>
                  <option value="Coding">Coding</option>
                  <option value="Rich Media">Rich Media</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold"><i class="bi bi-shield-lock me-1"></i> Visibility</label>
                <div class="d-flex align-items-center gap-3 p-3 rounded"
                  style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12)">
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="editTplIsPublic"
                      style="width:2.5em;height:1.3em;">
                    <label class="form-check-label fw-semibold ms-2" for="editTplIsPublic">Public Prompt</label>
                  </div>
                  <span class="text-muted small" id="editTplVisibilityHint">🔒 Private — only visible to you</span>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold">Prompt Text</label>
                <textarea class="form-control cosmic-input" id="editTplText" rows="8" required></textarea>
                <div class="form-text">Use <code>[variable-name]</code> tokens. Example:
                  <code>Write a [tone] email to [recipient].</code>
                </div>
              </div>
            </div>
            <hr class="my-4">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
              <h6 class="mb-0"><i class="bi bi-sliders me-2"></i>Variables</h6>
              <div class="d-flex gap-2 flex-wrap align-items-center">
                <input type="search" class="form-control form-control-sm cosmic-input" id="editVarSearch"
                  placeholder="&#128269; Search variables…" style="width:200px">
                <button class="btn btn-outline-light btn-sm cosmic-btn" type="button" id="addVarBtn" data-ripple>
                  <i class="bi bi-plus-circle me-1"></i>Add Variable</button>
                <button class="btn btn-outline-warning btn-sm cosmic-btn" type="button" id="reparseBtn" data-ripple
                  title="Re-parse variables from prompt text"><i class="bi bi-magic"></i> Re-parse</button>
              </div>
            </div>
            <div id="editVarContainer" class="mt-3"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-ripple>Cancel</button>
          <button type="button" class="btn btn-success" id="saveTplBtn" data-ripple><i class="bi bi-save me-1"></i>Save
            Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js?v=20260224a"></script>
</body>

</html>
